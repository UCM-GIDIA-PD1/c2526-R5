name: MTA Data Collector

on:
  schedule:
    # Se ejecuta cada 30 minutos
    - cron: '10,25,40,55 * * * *'
  workflow_dispatch:

jobs:
  collect-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Ejecutar pipeline RT y subir ventana
        run: uv run python src/ETL/pipelines/upload_realtime_window.py
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }}
          GDRIVE_SHARE_EMAILS: ${{ secrets.GDRIVE_SHARE_EMAILS }}